name: Build macOS CLI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_arch: ARM64
            target: bun-darwin-arm64
            binary: wktree-darwin-arm64
          - runner_arch: X64
            target: bun-darwin-x64
            binary: wktree-darwin-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: |
          bun run typecheck
          bun run check
          bun test tests

      - name: Build standalone macOS binary
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.binary }} ./bin/wktree.ts
          chmod +x dist/${{ matrix.binary }}
          tar -C dist -czf dist/${{ matrix.binary }}.tar.gz ${{ matrix.binary }}
          shasum -a 256 dist/${{ matrix.binary }}.tar.gz > dist/${{ matrix.binary }}.tar.gz.sha256

      - name: Smoke test native binary
        if: runner.arch == matrix.runner_arch
        run: ./dist/${{ matrix.binary }} --help >/dev/null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: |
            dist/${{ matrix.binary }}.tar.gz
            dist/${{ matrix.binary }}.tar.gz.sha256
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "macOS wktree binaries" || \
            gh release view "${GITHUB_REF_NAME}" >/dev/null
          gh release upload "${GITHUB_REF_NAME}" \
            dist/${{ matrix.binary }}.tar.gz \
            dist/${{ matrix.binary }}.tar.gz.sha256 \
            --clobber
